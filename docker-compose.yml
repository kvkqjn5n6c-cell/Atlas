services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/prisma/atlas_baseline_initial.sql:/docker-entrypoint-initdb.d/001_atlas_baseline_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  atlas-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-app
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas
      DATA_MODE: local
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: docker-local-development-secret-change-me
      PRISMA_MIGRATE_DEPLOY: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
